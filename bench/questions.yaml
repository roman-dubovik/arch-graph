# ─── Extended question set (q16–q30) ──────────────────────────────────────
# Questions below are grouped by id, not category, to keep diffs minimal.
# Each question's `category` field is the source of truth for taxonomy:
#
#   - cross-domain    join across two edge kinds (e.g. queue + table)
#   - refactor-impact "if I rename / drop X, what breaks?"
#   - negative        boolean "is there ANY producer/subscriber/user?"
#   - diagnostics     answer lives in diagnostics.json (informational —
#                     see header note above on scorer coverage)
#   - di              transitive di-import closure
#
# See bench/report.md → "Question taxonomy" for the prose explanation.

- id: q16
  project: D
  category: refactor-impact
  difficulty: medium
  question: >-
    If I rename the 'scraper' service, which BullMQ queues, HTTP endpoints,
    and Nest modules in this project carry an edge that references it and
    therefore have to be updated?
  ground_truth_ids:
    - service:scraper
  ground_truth_labels:
    - scraper
    - scraper-jobs
    - http-external

