# Benchmark questions — head-to-head: arch-graph vs graphify
#
# Each question is an architecture-grade query an engineer would ask their LLM
# while working on the project. Ground truth is derived from arch-graph's
# `graph.json` for each project — so questions express things arch-graph
# *can* answer by design. We track:
#
#   - `ground_truth_ids`   — canonical arch-graph node IDs
#   - `ground_truth_labels`— plain-text labels we expect to see in the answer
#                            (these are what we actually look for in the LLM
#                            context, because graphify uses a different ID
#                            scheme — see report.md `Heuristic`).
#
# Project ids (`A`, `B`, `C`, `D`, `E`) are placeholders. To run this bench
# locally, replace each `project:` value with the `id` from your own
# `configs/<id>.config.ts`, and adjust the subjects / queues / tables / module
# names below to match your codebase. The questions and ground-truth labels
# shipped here are anonymized samples — the real ones measured the report in
# this repo against five private NestJS monorepos that are not part of the
# public release.
#
# Total: 30 questions, 6 per project (A, B, C, D, E).
#
# Categories (count): nats (4), bullmq (2), typeorm (2), di (4), http (1),
# lib / ts-imports (1), multi-hop (2), cross-domain (5), refactor-impact (5),
# negative (3), diagnostics (1).
#
# Some categories below (notably `diagnostics`) target information that lives
# in `diagnostics.json`, not `graph.json`. The current bench scorer only
# serializes `graph.json` and runs substring-presence checks on it — so
# `diagnostics`-category questions are **informational** for now: they
# document a class of architectural query arch-graph is designed to answer,
# but the automated recall score for them will reflect whatever fragments of
# the diagnostic context leak into graph.json (often zero). They are kept in
# the YAML so the taxonomy is complete and so a future scorer that ingests
# `diagnostics.json` can pick them up automatically.

# ─── NATS pub/sub paths ────────────────────────────────────────────────────
- id: q01
  project: A
  category: nats
  difficulty: easy
  question: "Which components publish on the NATS subject 'events.message.received'?"
  ground_truth_ids:
    - lib:libs/shared/messaging
  ground_truth_labels:
    - libs/shared/messaging
    - events.message.received

- id: q02
  project: A
  category: nats
  difficulty: medium
  question: "Which services or libraries subscribe to 'events.message.received'?"
  ground_truth_ids:
    - service:api-main
    - lib:libs/shared/messaging
  ground_truth_labels:
    - api-main
    - libs/shared/messaging
    - events.message.received

