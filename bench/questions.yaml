# Benchmark questions — head-to-head: arch-graph vs graphify
#
# Each question is an architecture-grade query an engineer would ask their LLM
# while working on the project. Ground truth is derived from arch-graph's
# `graph.json` for each project — so questions express things arch-graph
# *can* answer by design. We track:
#
#   - `ground_truth_ids`   — canonical arch-graph node IDs
#   - `ground_truth_labels`— plain-text labels we expect to see in the answer
#                            (these are what we actually look for in the LLM
#                            context, because graphify uses a different ID
#                            scheme — see report.md `Heuristic`).
#
# Categories (count): nats-pubsub (4), bullmq (2), typeorm (2), di (2),
# http (1), ts-imports / libs (2), multi-hop (2).

# ─── NATS pub/sub paths ────────────────────────────────────────────────────
- id: q01
  project: platform
  category: nats
  difficulty: easy
  question: "Which components publish on the NATS subject 'platform.events.message.received'?"
  ground_truth_ids:
    - lib:libs/platform/messaging
  ground_truth_labels:
    - libs/platform/messaging
    - platform.events.message.received

- id: q02
  project: platform
  category: nats
  difficulty: medium
  question: "Which services or libraries subscribe to 'platform.events.message.received'?"
  ground_truth_ids:
    - service:platform-api
    - lib:libs/platform/messaging
  ground_truth_labels:
    - platform-api
    - libs/platform/messaging
    - platform.events.message.received

- id: q03
  project: insyra
  category: nats
  difficulty: easy
  question: "Which service replies to the NATS subject 'cron.register.nats'?"
  ground_truth_ids:
    - service:be-cron-service
  ground_truth_labels:
    - be-cron-service
    - cron.register.nats

- id: q04
  project: screenia
  category: nats
  difficulty: easy
  question: "Which service handles requests on 'cron.register.nats'?"
  ground_truth_ids:
    - service:be-cron-service
  ground_truth_labels:
    - be-cron-service
    - cron.register.nats

